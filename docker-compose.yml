version: '3.8'

services:
  ml-service:
    build:
      context: ./ml_service
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./ml_service:/app
      # If there are models, mount them here
      # - ../models:/app/models
    restart: unless-stopped

  api-gateway:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      - ML_SERVICE_URL=http://ml-service:8000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      - ml-service
    volumes:
      - ./server/data:/app/data
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: unless-stopped
